name: Release
on:
  push:
    branches:
      - master
      - next

permissions:
  id-token: write
  contents: write

env:
  VOLTA_FEATURE_PNPM: 1

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp install --frozen-lockfile
      - run: vp run lint
      - run: vp run test
      - run: vp run build
      - run: vp run size

      - name: Setup git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email ""

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vp exec nx release -y
